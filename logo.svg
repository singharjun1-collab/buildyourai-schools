<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 48" fill="none">
  <defs>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- "build your" text -->
  <text x="0" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="32" font-weight="600" fill="#1e1b4b" letter-spacing="-0.5">build your</text>
  <!-- "AI" text with gradient -->
  <text x="202" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="32" font-weight="800" fill="url(#ai-grad)" letter-spacing="-0.5">AI</text>
  <!-- ".app" text subtle -->
  <text x="243" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#94a3b8" letter-spacing="-0.5">.app</text>
</svg>
