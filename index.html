<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Your AI — AI Consulting for Every Industry</title>
    <meta name="description" content="We help organisations automate workflows with AI. Practical, hands-on consulting tailored to your industry.">
    <link rel="canonical" href="https://buildyourai.app/">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://buildyourai.app/">
    <meta property="og:title" content="Build Your AI — AI Consulting for Every Industry">
    <meta property="og:description" content="We help organisations automate workflows with AI. Practical, hands-on consulting tailored to your industry.">
    <meta property="og:site_name" content="Build Your AI">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fafafa;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
        .container{max-width:640px;text-align:center}
        .logo{font-size:1.6rem;font-weight:600;letter-spacing:-0.02em;margin-bottom:2rem}
        .logo .ai{background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
        .logo .dot{color:#94a3b8;font-weight:400}
        h1{font-size:2.4rem;font-weight:700;line-height:1.2;margin-bottom:1rem;letter-spacing:-0.03em}
        h1 span{background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        p.sub{font-size:1.15rem;color:#64748b;line-height:1.6;margin-bottom:2.5rem}
        .verticals{display:flex;flex-direction:column;gap:1rem;margin-bottom:2.5rem}
        .v-card{display:flex;align-items:center;gap:1rem;padding:1.25rem 1.5rem;background:#fff;border:1px solid #e2e8f0;border-radius:12px;text-decoration:none;color:#1a1a2e;transition:all .2s}
        .v-card:hover{border-color:#6366f1;box-shadow:0 4px 20px rgba(99,102,241,.12);transform:translateY(-2px)}
        .v-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
        .v-icon.edu{background:#ede9fe}
        .v-text h3{font-size:1rem;font-weight:600;margin-bottom:.15rem}
        .v-text p{font-size:.85rem;color:#64748b;margin:0}
        .v-arrow{margin-left:auto;color:#94a3b8;font-size:1.2rem}
        .coming{opacity:.5;pointer-events:none}
        .coming .v-arrow::after{content:'Coming soon';font-size:.65rem;color:#94a3b8}
        footer{margin-top:3rem;font-size:.8rem;color:#94a3b8}
        footer a{color:#6366f1;text-decoration:none}
        @media(max-width:600px){h1{font-size:1.8rem}p.sub{font-size:1rem}.v-card{padding:1rem}}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">build your <span class="ai">AI</span><span class="dot">.app</span></div>
        <h1>AI automation, <span>tailored to your industry</span></h1>
        <p class="sub">We help teams save 10+ hours a week by building practical AI workflows. No fluff, no jargon — just results.</p>
        <div class="verticals">
            <a href="/AIforeducation/" class="v-card">
                <div class="v-icon edu">&#127891;</div>
                <div class="v-text">
                    <h3>AI for Education</h3>
                    <p>Private &amp; independent schools</p>
                </div>
                <div class="v-arrow">&rarr;</div>
            </a>
        </div>
        <p class="sub" style="font-size:.95rem;margin-bottom:0">More verticals coming soon. <a href="mailto:education@buildyourai.app" style="color:#6366f1;text-decoration:none;font-weight:500">Get in touch</a></p>
    </div>
    <footer>&copy; 2026 buildyourai.app</footer>
</body>
</html>
